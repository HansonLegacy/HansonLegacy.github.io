<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiaxuan Li — Homepage</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 48px 56px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 480px;
        }
        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            color: white;
            font-size: 36px;
            font-weight: 600;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .affiliation {
            color: #86868b;
            font-size: 15px;
            margin-bottom: 28px;
        }
        .info {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .info-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 15px;
            color: #1d1d1f;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            background: #f5f5f7;
            transition: background 0.2s;
        }
        .info-item:hover {
            background: #e8e8ed;
        }
        .info-item a {
            color: #1d1d1f;
            text-decoration: none;
        }
        .icon {
            width: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">JL</div>
        <h1>Jiaxuan Li</h1>
        <p class="affiliation">Graduate Student, Artificial Intelligence</p>
        <div class="info">
            <div class="info-item">
                <span class="icon">📧</span>
                <a href="mailto:kite_hanson@163.com">kite_hanson@163.com</a>
            </div>
            <div class="info-item">
                <span class="icon">🐙</span>
                <a href="https://github.com/HansonLegacy" target="_blank">github.com/HansonLegacy</a>
            </div>
        </div>
    </div>
</body>
</html>
